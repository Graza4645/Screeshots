  generate-report:
    name: Generate Allure Report
    needs: [test-functional, test-esic, test-pf, test-lta, test-meal, test-statutory-bonus, test-minimum-wages, test-vehicle, test-driver, test-ideal-perf, test-total-benefits, test-total-fixed]
