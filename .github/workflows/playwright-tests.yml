name: Playwright Tests CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  test-driver:
    name: Driver Salary Validation
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run Driver Salary Tests
        run: npx playwright test driverSalaryValidation.spec.js
        continue-on-error: true
        id: test-run
      - name: Upload partial screenshots (runs even if cancelled)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-driver
          path: tests/Hiring_Tabulation_SalaryCalculator/screenshots/DriverSalary/
          retention-days: 30
          if-no-files-found: ignore
      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-results
          npx allure generate allure-results --clean -o allure-report
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore
